name: Unit Tests

on:
  push:
    paths:
      - 'street-brawler.html'
      - 'run-tests.js'
      - '.github/workflows/test.yml'
  pull_request:
    paths:
      - 'street-brawler.html'
      - 'run-tests.js'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run unit tests
        run: node run-tests.js
